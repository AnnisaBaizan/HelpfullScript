services:
  - type: web
    name: voicescribe-ai
    runtime: node
    rootDir: voicescribe-ai
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GLADIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
